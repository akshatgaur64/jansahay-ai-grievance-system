<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access | JanSahay Admin</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --brand-primary: #003366;
            --brand-accent: #00a8ff;
            --bg-dark: #0f172a;
        }

        body { 
            background: radial-gradient(circle at center, #1e293b 0%, var(--bg-dark) 100%);
            height: 100vh; 
            margin: 0;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #f8fafc;
        }

        /* Sophisticated Login Container */
        .auth-container { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem; 
            border-radius: 24px; 
            width: 100%; 
            max-width: 420px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.4s ease;
        }

        .auth-container:hover {
            border-color: rgba(255, 255, 255, 0.2);
        }

        .brand-logo {
            font-size: 2.5rem;
            color: var(--brand-accent);
            margin-bottom: 1rem;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 0.8rem 1.2rem;
            border-radius: 12px;
            transition: all 0.3s;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--brand-accent);
            color: #fff;
            box-shadow: 0 0 0 4px rgba(0, 168, 255, 0.15);
        }

        .btn-auth {
            background: var(--brand-accent);
            color: var(--bg-dark);
            font-weight: 800;
            padding: 0.9rem;
            border-radius: 12px;
            border: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 1.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 168, 255, 0.4);
            background: #33beff;
        }

        /* Error state styling */
        .error-toast {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            padding: 0.75rem;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }

        .meta-text {
            color: #64748b;
            font-size: 0.75rem;
            margin-top: 2rem;
        }
    </style>
</head>
<body>

    <div class="auth-container text-center">
        <div class="brand-logo">
            <i class="fas fa-fingerprint"></i>
        </div>
        
        <h3 class="mb-2 fw-bold">Admin Access</h3>
        <p class="text-muted small mb-4">JanSahay Professional Intelligence</p>

        {% if error %}
        <div class="error-toast animate__animated animate__shakeX">
            <i class="fas fa-exclamation-circle me-2"></i> {{ error }}
        </div>
        {% endif %}

        <form action="/login" method="POST" id="loginForm">
            <div class="mb-3">
                <input type="text" name="username" class="form-control" placeholder="Identity UID" required>
            </div>
            <div class="mb-4">
                <input type="password" name="password" class="form-control" placeholder="Security Passcode" required>
            </div>
            
            <button type="submit" class="btn btn-auth w-100" id="loginBtn">
                Authenticate System
            </button>
        </form>

        <div class="meta-text">
            <i class="fas fa-shield-halved me-1"></i> AES-256 Encrypted Session<br>
            Developed by <strong>Akshat Gaur</strong>
        </div>
    </div>

    <script>
        // Subtle loading effect preferred by Big Tech
        document.getElementById('loginForm').onsubmit = function() {
            const btn = document.getElementById('loginBtn');
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Verifying...';
            btn.style.opacity = '0.7';
        };
    </script>

</body>
</html>
